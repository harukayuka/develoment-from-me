<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post — Development from Me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FAF6F0;
      --cream-dark: #F0E9DF;
      --rose: #C8856A;
      --rose-light: #E8C4B4;
      --rose-pale: #F5EAE4;
      --ink: #2C1F1A;
      --ink-soft: #5C4A40;
      --ink-muted: #9C8A80;
      --gold: #B8925A;
      --gold-light: #E8D4B0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--rose-pale) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -150px; left: -150px;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--gold-light) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    /* ── HEADER ── */
    header {
      padding: 56px 0 40px;
      text-align: center;
    }

    .header-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
      animation: fadeDown 0.8s ease both;
    }

    .ornament-line {
      height: 1px; width: 60px;
      background: linear-gradient(to right, transparent, var(--rose-light));
    }
    .ornament-line.right {
      background: linear-gradient(to left, transparent, var(--rose-light));
    }
    .ornament-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--rose);
    }

    .site-tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-top: 16px;
      animation: fadeDown 1s ease 0.2s both;
    }

    .header-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 40px;
      animation: fadeDown 1s ease 0.3s both;
    }

    .header-divider-line {
      flex: 1;
      max-width: 200px;
      height: 1px;
      background: var(--cream-dark);
    }

    .header-divider-symbol {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      color: var(--rose-light);
    }
    
    /* ── BACK LINK ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 36px 0 32px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      text-decoration: none;
      transition: color 0.2s ease;
      animation: fadeUp 0.7s ease 0.3s both;
    }

    .back-link:hover { color: var(--rose); }

    .back-link svg {
      width: 14px; height: 14px;
      transition: transform 0.2s ease;
    }

    .back-link:hover svg { transform: translateX(-3px); }

    /* ── POST META HEADER ── */
    .post-header {
      margin-bottom: 36px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--cream-dark);
      animation: fadeUp 0.7s ease 0.4s both;
    }

    .post-meta-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .post-meta-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--rose-light);
    }

    .post-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      line-height: 1.15;
      color: var(--ink);
    }

    /* ── POST CONTENT (Markdown rendered) ── */
    .post-card {
      background: white;
      border: 1px solid var(--cream-dark);
      border-radius: 16px;
      padding: 44px 48px;
      animation: fadeUp 0.7s ease 0.5s both;
    }

    /* Typography for rendered markdown */
    .post-card h1,
    .post-card h2,
    .post-card h3,
    .post-card h4 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.3;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
    }

    .post-card h1 { font-size: 1.9rem; }
    .post-card h2 { font-size: 1.55rem; }
    .post-card h3 { font-size: 1.3rem; }
    .post-card h4 { font-size: 1.1rem; }

    .post-card h1:first-child,
    .post-card h2:first-child,
    .post-card h3:first-child {
      margin-top: 0;
    }

    .post-card p {
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.85;
      color: var(--ink-soft);
      margin-bottom: 1.2rem;
    }

    .post-card p:last-child { margin-bottom: 0; }

    .post-card a {
      color: var(--rose);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .post-card a:hover { color: var(--gold); }

    .post-card strong {
      font-weight: 500;
      color: var(--ink);
    }

    .post-card em {
      font-style: italic;
      color: var(--ink-soft);
    }

    .post-card ul,
    .post-card ol {
      padding-left: 1.4rem;
      margin-bottom: 1.2rem;
    }

    .post-card li {
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.8;
      color: var(--ink-soft);
      margin-bottom: 0.4rem;
    }

    .post-card blockquote {
      margin: 1.6rem 0;
      padding: 1rem 1.4rem;
      border-left: 3px solid var(--rose);
      background: var(--rose-pale);
      border-radius: 0 8px 8px 0;
    }

    .post-card blockquote p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-style: italic;
      color: var(--ink-soft);
      margin: 0;
    }

    .post-card code {
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      background: var(--cream-dark);
      color: var(--rose);
      padding: 2px 7px;
      border-radius: 4px;
    }

    .post-card pre {
      background: var(--ink);
      border-radius: 10px;
      padding: 20px 24px;
      overflow-x: auto;
      margin: 1.4rem 0;
    }

    .post-card pre code {
      background: transparent;
      color: var(--cream);
      font-size: 0.88rem;
      padding: 0;
    }

    .post-card hr {
      border: none;
      border-top: 1px solid var(--cream-dark);
      margin: 2rem 0;
    }

    .post-card img {
      max-width: 100%;
      border-radius: 10px;
      margin: 1rem 0;
    }

    /* ── LOADING & ERROR STATES ── */
    .state-message {
      text-align: center;
      padding: 48px 0;
      color: var(--ink-muted);
    }

    .state-message p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-style: italic;
    }

    .loading-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--rose-light);
      margin: 0 3px;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 64px;
      padding-bottom: 56px;
      text-align: center;
    }

    .footer-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .footer-ornament-line {
      height: 1px; width: 80px;
      background: var(--cream-dark);
    }

    .footer-ornament-symbol {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      color: var(--rose-light);
      font-style: italic;
    }

    footer p {
      font-size: 0.78rem;
      color: var(--ink-muted);
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    footer a { color: var(--rose); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 560px) {
      .post-card { padding: 28px 24px; }
      header { padding: 44px 0 28px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="header-ornament">
        <div class="ornament-line"></div>
        <div class="ornament-dot"></div>
        <div class="ornament-line right"></div>
      </div>

      <h1 class="site-title">Development <em>from</em> Me</h1>
      <p class="site-tagline">Ide &nbsp;·&nbsp; Riset &nbsp;·&nbsp; Perasaan dalam Markdown</p>

      <div class="header-divider">
        <div class="header-divider-line"></div>
        <span class="header-divider-symbol">✦</span>
        <div class="header-divider-line"></div>
      </div>
    </header>

    <main>
      <a href="index.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M5 12l7-7M5 12l7 7"/>
        </svg>
        Kembali ke Beranda
      </a>

      <div class="post-header" id="post-header" style="display:none;">
        <div class="post-meta-top" id="post-meta"></div>
        <h1 class="post-heading" id="post-heading"></h1>
      </div>

      <div class="post-card" id="post-card">
        <div class="state-message">
          <div class="loading-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div class="footer-ornament">
        <div class="footer-ornament-line"></div>
        <span class="footer-ornament-symbol">❧</span>
        <div class="footer-ornament-line"></div>
      </div>
      <p>crafted with care &nbsp;·&nbsp; <a href="https://develoment-from-me.harukayuka19.workers.dev">Development from Me</a></p>

  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const file = urlParams.get('file');

    function parseFilename(filename) {
      // Format: "Title | HH:MM | YYYY-MM-DD.md"
      const parts = filename.replace('.md', '').split('|').map(s => s.trim());
      return {
        title: parts[0] || filename,
        time:  parts[1] || '',
        date:  parts[2] || ''
      };
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        const d = new Date(dateStr);
        return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
      } catch { return dateStr; }
    }

    if (file) {
      const info = parseFilename(decodeURIComponent(file));

      // Set page title
      document.title = info.title + ' — Development from Me';

      // Show header block
      const header = document.getElementById('post-header');
      const metaEl = document.getElementById('post-meta');
      const headingEl = document.getElementById('post-heading');

      headingEl.textContent = info.title;

      let metaHtml = '';
      if (info.date) metaHtml += `<span>${formatDate(info.date)}</span>`;
      if (info.date && info.time) metaHtml += `<span class="post-meta-dot"></span>`;
      if (info.time) metaHtml += `<span>${info.time}</span>`;
      metaEl.innerHTML = metaHtml;
      header.style.display = 'block';

      fetch(`posts/${file}`)
        .then(r => {
          if (!r.ok) throw new Error('not found');
          return r.text();
        })
        .then(text => {
          // Strip first H1 if it matches the title (avoid duplicate heading)
          const cleaned = text.replace(/^#\s+.+\n?/, '');
          document.getElementById('post-card').innerHTML = marked.parse(cleaned);
        })
        .catch(() => {
          document.getElementById('post-card').innerHTML =
            '<div class="state-message"><p>Postingan tidak dapat dimuat.</p></div>';
        });
    } else {
      document.getElementById('post-card').innerHTML =
        '<div class="state-message"><p>Tidak ada postingan yang dipilih.</p></div>';
    }
  </script>
</body>
</html>
