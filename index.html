<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Development from Me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FAF6F0;
      --cream-dark: #F0E9DF;
      --rose: #C8856A;
      --rose-light: #E8C4B4;
      --rose-pale: #F5EAE4;
      --ink: #2C1F1A;
      --ink-soft: #5C4A40;
      --ink-muted: #9C8A80;
      --gold: #B8925A;
      --gold-light: #E8D4B0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Decorative background */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--rose-pale) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -150px;
      left: -150px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--gold-light) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    /* ── HEADER ── */
    header {
      padding: 80px 0 60px;
      text-align: center;
      position: relative;
    }

    .header-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 28px;
      animation: fadeDown 0.8s ease both;
    }

    .ornament-line {
      height: 1px;
      width: 60px;
      background: linear-gradient(to right, transparent, var(--rose-light));
    }

    .ornament-line.right {
      background: linear-gradient(to left, transparent, var(--rose-light));
    }

    .ornament-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--rose);
    }

    .site-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 6vw, 4.2rem);
      font-weight: 300;
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--ink);
      animation: fadeDown 0.9s ease 0.1s both;
    }

    .site-title em {
      font-style: italic;
      color: var(--rose);
    }

    .site-tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-top: 16px;
      animation: fadeDown 1s ease 0.2s both;
    }

    .header-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 40px;
      animation: fadeDown 1s ease 0.3s both;
    }

    .header-divider-line {
      flex: 1;
      max-width: 200px;
      height: 1px;
      background: var(--cream-dark);
    }

    .header-divider-symbol {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      color: var(--rose-light);
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: fadeUp 0.8s ease 0.4s both;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--cream-dark);
    }

    /* ── POST LIST ── */
    .post-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .post-item {
      background: transparent;
      border: none;
      padding: 0;
      animation: fadeUp 0.7s ease both;
    }

    .post-item:nth-child(1) { animation-delay: 0.5s; }
    .post-item:nth-child(2) { animation-delay: 0.62s; }
    .post-item:nth-child(3) { animation-delay: 0.74s; }
    .post-item:nth-child(4) { animation-delay: 0.86s; }

    .post-link {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 24px 28px;
      background: white;
      border: 1px solid var(--cream-dark);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .post-link::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--rose);
      transform: scaleY(0);
      transition: transform 0.3s ease;
      border-radius: 0 2px 2px 0;
    }

    .post-link:hover {
      border-color: var(--rose-light);
      box-shadow: 0 8px 32px rgba(200, 133, 106, 0.1);
      transform: translateX(4px);
    }

    .post-link:hover::before {
      transform: scaleY(1);
    }

    .post-date-block {
      flex-shrink: 0;
      text-align: center;
      background: var(--rose-pale);
      border-radius: 8px;
      padding: 10px 14px;
      min-width: 58px;
    }

    .post-date-day {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--rose);
      line-height: 1;
      display: block;
    }

    .post-date-mon {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      display: block;
      margin-top: 3px;
    }

    .post-content {
      flex: 1;
      min-width: 0;
    }

    .post-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.3;
      display: block;
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      font-size: 0.78rem;
      color: var(--ink-muted);
      font-weight: 300;
    }

    .post-meta-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--rose-light);
      flex-shrink: 0;
    }

    .post-arrow {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--cream-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      color: var(--ink-muted);
    }

    .post-link:hover .post-arrow {
      background: var(--rose);
      border-color: var(--rose);
      color: white;
    }

    .post-arrow svg {
      width: 14px;
      height: 14px;
      transition: transform 0.3s ease;
    }

    .post-link:hover .post-arrow svg {
      transform: translate(1px, -1px);
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 80px;
      padding-bottom: 60px;
      text-align: center;
    }

    .footer-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .footer-ornament-line {
      height: 1px;
      width: 80px;
      background: var(--cream-dark);
    }

    .footer-ornament-symbol {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      color: var(--rose-light);
      font-style: italic;
    }

    footer p {
      font-size: 0.78rem;
      color: var(--ink-muted);
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    footer a {
      color: var(--rose);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 64px 0;
      color: var(--ink-muted);
    }

    .empty-state p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-style: italic;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 520px) {
      header { padding: 56px 0 44px; }
      .post-link { padding: 18px 18px; gap: 16px; }
      .post-title { font-size: 1.15rem; }
      .post-date-block { min-width: 50px; padding: 8px 10px; }
      .post-date-day { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- HEADER -->
    <header>
      <div class="header-ornament">
        <div class="ornament-line"></div>
        <div class="ornament-dot"></div>
        <div class="ornament-line right"></div>
      </div>

      <h1 class="site-title">Development <em>from</em> Me</h1>
      <p class="site-tagline">Ide &nbsp;·&nbsp; Riset &nbsp;·&nbsp; Perasaan dalam Markdown</p>

      <div class="header-divider">
        <div class="header-divider-line"></div>
        <span class="header-divider-symbol">✦</span>
        <div class="header-divider-line"></div>
      </div>
    </header>

    <!-- POST LIST -->
    <main>
      <div class="section-label">Postingan</div>
      <ul class="post-list">
        <li class="post-item">
          <a href="post.html?file=Ide%20Pertama%20%7C%2014%3A30%20%7C%202024-04-09.md" class="post-link">
            <div class="post-date-block">
              <span class="post-date-day">09</span>
              <span class="post-date-mon">Apr</span>
            </div>
            <div class="post-content">
              <span class="post-title">Ide Pertama</span>
              <div class="post-meta">
                <span>2024</span>
                <span class="post-meta-dot"></span>
                <span>14:30</span>
              </div>
            </div>
            <div class="post-arrow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 17L17 7M7 7h10v10"/>
              </svg>
            </div>
          </a>
        </li>

        <li class="post-item">
          <a href="post.html?file=Riset%20Teknologi%20%7C%2010%3A15%20%7C%202024-04-10.md" class="post-link">
            <div class="post-date-block">
              <span class="post-date-day">10</span>
              <span class="post-date-mon">Apr</span>
            </div>
            <div class="post-content">
              <span class="post-title">Riset Teknologi</span>
              <div class="post-meta">
                <span>2024</span>
                <span class="post-meta-dot"></span>
                <span>10:15</span>
              </div>
            </div>
            <div class="post-arrow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 17L17 7M7 7h10v10"/>
              </svg>
            </div>
          </a>
        </li>
      </ul>
    </main>

    <!-- FOOTER -->
    <footer>
      <div class="footer-ornament">
        <div class="footer-ornament-line"></div>
        <span class="footer-ornament-symbol">❧</span>
        <div class="footer-ornament-line"></div>
      </div>
      <p>crafted with care &nbsp;·&nbsp; <a href="https://harukayuka19.github.io">harukayuka19.github.io</a></p>
    </footer>

  </div>
</body>
</html>
